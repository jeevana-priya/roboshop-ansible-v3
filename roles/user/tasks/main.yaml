- name: app-setup
  import_role:
    name: common
    tasks_from: app-setup

- name: nodejs setup
  import.role:
    name: common
    tasks_from: nodejs

- name: systemd setup
  import.role:
    name: common
    tasks_from: systemd-setup
- name: enable and restart user
  service:
    name: user
    state: restarted
    enabled: yes
